<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

   <div class="sidebar">
    <div class="sidebar-brand">
        <h1>PulseSync 🏥</h1>
        <span>Hospital System</span>
    </div>
    
    <ul class="nav-menu">
        <li class="nav-parent active">
            📊 Dashboard
            <ul class="nav-children">
                <li onclick="switchTab(event, 'dashboard-tab')">Overview Stats</li>
                <li onclick="switchTab(event, 'documents-tab')">Documents Table</li>
                <li onclick="switchTab(event, 'external-tab')">External Data</li>
            </ul>
        </li>
    </ul>

    <button class="logout-btn" onclick="logout()">
        Logout 🚪
    </button>
</div>

    <div class="main-content">

        <div class="topbar">
            <div class="page-title">
                <h1>Document Management Dashboard</h1>
            </div>
            
            <div class="topbar-right">
                <input
                    type="text"
                    id="search"
                    placeholder="Search patient..."
                    onkeyup="searchDocuments()"
                >
                <div class="user-profile">
                    <span id="userDisplay"></span>
                </div>
            </div>
        </div>

        <div class="cards">
            <div class="card stats-card">
                <div>
                    <h3>Total Documents</h3>
                    <p id="totalDocs">0</p>
                </div>
            </div>
        </div>

        <div class="content-grid">
            <div class="card form-card">
                <h2>Add Document</h2>
                <div class="form-group">
                    <input
                        type="text"
                        id="patient"
                        placeholder="Patient name"
                    >
                </div>
                <div class="form-group">
                    <input
                        type="text"
                        id="type"
                        placeholder="Document type"
                    >
                </div>
                <button class="btn-primary" onclick="addDocument()">
                    Save Document
                </button>
            </div>

            <div class="card documents-card">
                <h2>Documents List</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Patient Name</th>
                                <th>Document Type</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="documentTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="card ajax-card">
            <div class="ajax-header">
                <h2>External Hospital Data</h2>
                <button class="btn-secondary" onclick="loadData()">
                    Load Data
                </button>
            </div>
            <div id="apiData" class="api-grid"></div>
        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
